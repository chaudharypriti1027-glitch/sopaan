# Render — https://render.com/docs/blueprint-spec
# Build from the monorepo root because the API imports runtime modules from shared/.

services:
  - type: web
    name: sopaan-api
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: PROCESS_ROLE
        value: api

  - type: worker
    name: sopaan-worker
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    dockerCommand: node src/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PROCESS_ROLE
        value: worker
